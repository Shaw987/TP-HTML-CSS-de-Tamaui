<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinique de Vairao</title>
  </head>
  <body>
    <header>
      <img src="sante-logo.jpg" alt="logo de la clinique." />
      <p>La santé avant tout</p>
      <nav>
        <ul>
          <li><a href="horaires.html">Horaires</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <p>
        <b>Clinique de Vairao</b> est un établissement médical situé à Vairao,
        sur la côte sud de Tahiti, fondé en 2026 par le Dr. Moeava TEAMOTUAITAU.
      </p>

      <h1>La clinique de la presqu'île</h1>
      <img src="image-vairao.webp" alt="image de Vairao."/>
      <h3>Formulaire de contact</h3>
      <form action="" method="get">
        <div>
          <label for="Nom"> Entrez votre nom:</label>
          <input type="text" name="Nom" id="Nom" required />
        </div>
        <div>
          <label for="Prénom"> Entrez votre prénom:</label>
          <input type="text" name="Prénom" id="Prénom" required />
        </div>
        <div>
          <label for="Email"> Entrez votre adresse mail:</label>
          <input type="email" name="Nom" id="Nom" required />
        </div>
        <div>
          <label for="patient"
            >Statut de patient :</label
          >
          <select id=""patient" name="statut">
            <option value="ancient">Ancien</option>
            <option value="nouveau">Nouveau</option>
        </select>
        </div>
        <div>
          <label for="Message"> Entrez votre message:</label>
          <input type="text" name="Message" />
        </div>
        <div>
          <input type="submit" value="Envoyer" />
        </div>
      </form>
    </main>
    <footer>
        <small>Copyright © 2026 taotemaohi.com. Tous droits réservés.</small>
    </footer>
  </body>
</html>
